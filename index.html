<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Resident Directory</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;0,9..144,900;1,9..144,400&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#F5F2EC;--card:#FFFDF8;--ink:#1A1208;--ink2:#5C5040;--ink3:#9C8E7A;
  --green:#2A5C3F;--mint:#D6EDE1;--gold:#C8922A;--gold-l:#FBF0D9;
  --red:#C0392B;--border:#E2D9CC;--sh:0 2px 16px rgba(26,18,8,.09);--r:16px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;}

nav{
  background:var(--green);padding:0 20px;
  display:flex;align-items:center;justify-content:space-between;
  height:62px;position:sticky;top:0;z-index:100;
  box-shadow:0 2px 14px rgba(0,0,0,.2);
}
.nav-logo{font-family:'Fraunces',serif;font-size:19px;font-weight:900;color:#fff;display:flex;align-items:center;gap:8px;}
.nav-right{display:flex;gap:8px;align-items:center;}
.sync-btn{
  background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.22);
  color:#fff;border-radius:9px;padding:7px 13px;font-size:12px;font-weight:600;
  cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:6px;
  transition:background .2s;
}
.btn-add-nav{
  background:var(--gold);color:#fff;border:none;border-radius:9px;
  padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer;
}

.hero{background:var(--green);padding:46px 20px 58px;text-align:center;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23fff' fill-opacity='.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/svg%3E");}
.hero h1{font-family:'Fraunces',serif;font-size:clamp(30px,6vw,54px);font-weight:900;color:#fff;line-height:1.08;margin-bottom:12px;}
.hero p{color:#C0D9CC;font-size:16px;max-width:440px;margin:0 auto 26px;line-height:1.6;}

.stats-bar{background:var(--card);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;justify-content:center;gap:36px;}
.stat-num{font-family:'Fraunces',serif;font-size:26px;font-weight:900;color:var(--green);text-align:center;}
.stat-lbl{font-size:11px;color:var(--ink3);font-weight:600;text-transform:uppercase;text-align:center;}

.main{max-width:1140px;margin:0 auto;padding:26px 18px 64px;}
.filter-bar{display:flex;gap:10px;margin-bottom:18px;align-items:center;}
.sbox{flex:1;display:flex;align-items:center;background:var(--card);border:2px solid var(--border);border-radius:12px;padding:0 14px;gap:9px;}
.sbox input{flex:1;border:none;outline:none;font-size:15px;padding:12px 0;background:transparent;}

.cats{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:20px;}
.cat{padding:7px 14px;border-radius:30px;border:2px solid var(--border);background:var(--card);font-size:12px;font-weight:600;cursor:pointer;}
.cat.on{background:var(--green);color:#fff;border-color:var(--green);}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(295px,1fr));gap:15px;}
.vcard{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);padding:17px;display:flex;flex-direction:column;gap:10px;position:relative;transition:transform .2s;}
.vcard:hover{transform:translateY(-3px);box-shadow:var(--sh);}

.trusted-badge{position:absolute;top:10px;right:10px;background:#EBF5EE;color:var(--green);font-size:10px;font-weight:800;padding:4px 8px;border-radius:6px;border:1px solid #A8D5BC;}

.cname{font-size:15px;font-weight:700;margin-bottom:3px;}
.ccat{display:inline-block;background:var(--gold-l);color:var(--gold);border-radius:5px;font-size:11px;font-weight:700;padding:2px 8px;}
.cphone{font-size:14px;font-weight:700;color:var(--green);margin-top:5px;}

.cacts{display:flex;gap:7px;margin-top:5px;}
.bcall{flex:1;background:var(--green);color:#fff;border:none;border-radius:9px;padding:10px;font-weight:700;cursor:pointer;}
.bedit{background:transparent;border:1.5px solid var(--border);border-radius:9px;padding:10px;font-weight:600;cursor:pointer;}

.ov{display:none;position:fixed;inset:0;background:rgba(26,18,8,.55);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(3px);}
.ov.open{display:flex;}
.modal{background:var(--card);border-radius:20px;width:100%;max-width:510px;padding:22px;box-shadow:0 24px 60px rgba(0,0,0,.25);}
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;}
.fi,.ft{width:100%;padding:11px;border:2px solid var(--border);border-radius:11px;outline:none;}
.bsub{width:100%;padding:13px;background:var(--green);color:#fff;border:none;border-radius:12px;font-weight:700;cursor:pointer;}

#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);padding:11px 22px;border-radius:40px;opacity:0;transition:0.3s;z-index:999;color:#fff;}
#toast.show{opacity:1;}
</style>
</head>
<body>

<nav>
  <div class="nav-logo">🏘️ Resident Directory</div>
  <div class="nav-right">
    <button class="sync-btn" onclick="window.open('https://drive.google.com/file/d/1W5Ze93vt-Zn8O1Rth_wlWv3fCf23mOd1/view?usp=sharing', '_blank')">📋 Rate List</button>
    <button class="sync-btn" id="syncBtn" onclick="loadVendors()">↻ Refresh</button>
    <button class="btn-add-nav" onclick="openAdd()">+ Add Vendor</button>
  </div>
</nav>

<section class="hero">
  <h1>Society Directory</h1>
  <p>Trusted neighborhood vendors with verified Versalia RWA rates.</p>
</section>

<div class="stats-bar">
  <div class="stat"><div class="stat-num" id="sV">—</div><div class="stat-lbl">Vendors</div></div>
  <div class="stat"><div class="stat-num" id="sC">—</div><div class="stat-lbl">Categories</div></div>
</div>

<div class="main">
  <div class="filter-bar">
    <div class="sbox">🔍 <input type="text" id="searchIn" placeholder="Search name or service..." oninput="renderVendors()"/></div>
  </div>
  <div class="cats" id="cats"></div>
  <div class="grid" id="grid"></div>
</div>

<div id="toast"></div>

<div class="ov" id="formModal">
  <div class="modal">
    <h2 id="formTitle" style="margin-bottom:15px; font-family:Fraunces;">Add Vendor</h2>
    <div class="fg"><label class="fl">Name *</label><input class="fi" id="fName"/></div>
    <div class="fg"><label class="fl">Phone (10 digits) *</label><input class="fi" id="fPhone" maxlength="10"/></div>
    <div class="fg"><label class="fl">Category *</label><input class="fi" id="fService" list="svcList"/><datalist id="svcList"></datalist></div>
    <div class="fg"><label class="fl">Description</label><textarea class="ft" id="fRemark"></textarea></div>
    <div class="fg">
        <label class="fl">Rating</label>
        <div id="starRating" style="font-size:24px; cursor:pointer; color:#E2D9CC;">
          <span onclick="setRating(1)">★</span><span onclick="setRating(2)">★</span><span onclick="setRating(3)">★</span><span onclick="setRating(4)">★</span><span onclick="setRating(5)">★</span>
        </div>
        <input type="hidden" id="fRating" value="0"/>
    </div>
    <button class="bsub" id="formSubmit" onclick="submitForm()"><span id="formBtnTxt">Save Vendor</span></button>
    <button style="width:100%; margin-top:10px; background:none; border:none; color:var(--ink3); cursor:pointer;" onclick="closeModal('formModal')">Cancel</button>
  </div>
</div>

<script>
const API = 'https://sheetdb.io/api/v1/5cje84i3oi667';
// Mapping to match your sheet exactly
const C_NAME = 'Name', C_PHON = 'Phone number', C_SVC = 'Category', C_REM = 'Description', C_RATE = 'Rating';

let vendors = [], activeCat = 'All', isEdit = false, currentRating = 0;

async function loadVendors() {
  try {
    const rows = await fetch(API).then(r => r.json());
    
    // Cleaning Data & Mapping to correct column headers
    const rawVendors = rows.filter(r => (r[C_NAME] || '').trim()).map(r => ({
      name: r[C_NAME],
      phone: (r[C_PHON] || '').toString().replace(/\s+/g, '').slice(-10),
      svc: r[C_SVC] || 'General',
      rem: r[C_REM] || '',
      rating: parseInt(r[C_RATE]) || 0
    }));

    // Grouping to limit duplicates (Keep top 3 per category by rating)
    const grouped = {};
    rawVendors.sort((a,b) => b.rating - a.rating).forEach(v => {
      if(!grouped[v.svc]) grouped[v.svc] = [];
      if(grouped[v.svc].length < 3) grouped[v.svc].push(v);
    });
    vendors = Object.values(grouped).flat();

    buildCats();
    renderVendors();
  } catch(e) { showToast('Error loading data', '#C0392B'); }
}

function renderVendors() {
  const q = document.getElementById('searchIn').value.toLowerCase();
  const list = vendors.filter(v => 
    (activeCat === 'All' || v.svc === activeCat) && 
    (v.name.toLowerCase().includes(q) || v.svc.toLowerCase().includes(q))
  );
  
  document.getElementById('grid').innerHTML = list.map(v => `
    <div class="vcard">
      ${v.rating >= 4 ? '<div class="trusted-badge">⭐ Highly Recommended</div>' : ''}
      <div class="cname">${v.name}</div>
      <span class="ccat">${v.svc}</span>
      <div style="color:var(--gold); font-size:12px;">${'★'.repeat(v.rating)}${'☆'.repeat(5-v.rating)}</div>
      <div class="cphone">📱 +91 ${v.phone}</div>
      <div class="cacts">
        <button class="bcall" onclick="window.location.href='tel:+91${v.phone}'">📞 Call</button>
        <button class="bedit" onclick="openEdit('${v.name}')">Edit</button>
      </div>
    </div>`).join('');
}

function setRating(n) {
  currentRating = n;
  const stars = document.querySelectorAll('#starRating span');
  stars.forEach((s, i) => s.style.color = i < n ? '#C8922A' : '#E2D9CC');
}

function openAdd() {
  isEdit = false;
  document.getElementById('formTitle').textContent = 'Add Vendor';
  document.getElementById('formBtnTxt').textContent = 'Add Vendor';
  clearForm();
  openModal('formModal');
}

function openEdit(name) {
  const v = vendors.find(x => x.name === name);
  if (!v) return;
  isEdit = true;
  document.getElementById('formTitle').textContent = 'Edit Vendor';
  document.getElementById('formBtnTxt').textContent = 'Update Vendor';
  document.getElementById('fName').value = v.name;
  document.getElementById('fPhone').value = v.phone;
  document.getElementById('fService').value = v.svc;
  document.getElementById('fRemark').value = v.rem;
  setRating(v.rating);
  openModal('formModal');
}

async function submitForm() {
  const name = document.getElementById('fName').value.trim();
  const phone = document.getElementById('fPhone').value.trim();
  const svc = document.getElementById('fService').value.trim();
  const rem = document.getElementById('fRemark').value.trim();

  if (!name || phone.length < 10 || !svc) {
    showToast('Fill all fields correctly', '#C0392B');
    return;
  }

  const payload = {
    [C_NAME]: name,
    [C_PHON]: phone,
    [C_SVC]: svc,
    [C_REM]: rem,
    [C_RATE]: currentRating
  };
  
  const url = isEdit ? `${API}/${C_NAME}/${encodeURIComponent(name)}` : API;
  const method = isEdit ? 'PATCH' : 'POST';

  try {
    await fetch(url, {
      method: method,
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({data: isEdit ? payload : [payload]})
    });
    closeModal('formModal');
    loadVendors();
    showToast(isEdit ? 'Updated!' : 'Added!', '#2A5C3F');
  } catch(e) { showToast('Save error', '#C0392B'); }
}

function buildCats() {
  const uniqueSvc = [...new Set(vendors.map(v => v.svc))];
  const cats = ['All', ...uniqueSvc];
  document.getElementById('cats').innerHTML = cats.map(c => `<button class="cat ${c===activeCat?'on':''}" onclick="activeCat='${c}';buildCats();renderVendors()">${c}</button>`).join('');
  document.getElementById('sV').textContent = vendors.length;
  document.getElementById('sC').textContent = uniqueSvc.length;
}

function openModal(id) { document.getElementById(id).style.display = 'flex'; }
function closeModal(id) { document.getElementById(id).style.display = 'none'; }
function clearForm() { document.querySelectorAll('.fi, .ft').forEach(i => i.value = ''); setRating(0); }
function showToast(m, c) { const t = document.getElementById('toast'); t.textContent = m; t.style.background = c; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); }

loadVendors();
</script>
</body>
</html>
