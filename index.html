<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Resident Directory</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;0,9..144,900;1,9..144,400&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#F5F2EC;--card:#FFFDF8;--ink:#1A1208;--ink2:#5C5040;--ink3:#9C8E7A;
  --green:#2A5C3F;--mint:#D6EDE1;--gold:#C8922A;--gold-l:#FBF0D9;
  --red:#C0392B;--border:#E2D9CC;--sh:0 2px 16px rgba(26,18,8,.09);--r:16px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;}

/* ── NAV ── */
nav{
  background:var(--green);padding:0 20px;
  display:flex;align-items:center;justify-content:space-between;
  height:62px;position:sticky;top:0;z-index:100;
  box-shadow:0 2px 14px rgba(0,0,0,.2);
}
.nav-logo{font-family:'Fraunces',serif;font-size:19px;font-weight:900;color:#fff;display:flex;align-items:center;gap:8px;}
.nav-right{display:flex;gap:8px;align-items:center;}
.sync-btn{
  background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.22);
  color:#fff;border-radius:9px;padding:7px 13px;font-size:12px;font-weight:600;
  cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:6px;
  transition:background .2s;
}
.sync-btn:hover{background:rgba(255,255,255,.22);}
.sync-icon{display:inline-block;transition:transform .5s;}
.sync-btn.loading .sync-icon{animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.btn-add-nav{
  background:var(--gold);color:#fff;border:none;border-radius:9px;
  padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer;
  font-family:'DM Sans',sans-serif;transition:opacity .2s;
}

/* ── HERO ── */
.hero{
  background:var(--green);padding:46px 20px 58px;
  text-align:center;position:relative;overflow:hidden;
}
.hero::before{
  content:'';position:absolute;inset:0;
  background:url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23fff' fill-opacity='.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/svg%3E");
}
.hero h1{font-family:'Fraunces',serif;font-size:clamp(30px,6vw,54px);font-weight:900;color:#fff;line-height:1.08;margin-bottom:12px;}
.hero p{color:#C0D9CC;font-size:16px;max-width:440px;margin:0 auto 26px;line-height:1.6;}

/* ── STATS ── */
.stats-bar{
  background:var(--card);border-bottom:1px solid var(--border);
  padding:16px 24px;display:flex;justify-content:center;gap:36px;flex-wrap:wrap;
}
.stat{text-align:center;}
.stat-num{font-family:'Fraunces',serif;font-size:26px;font-weight:900;color:var(--green);}
.stat-lbl{font-size:11px;color:var(--ink3);font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-top:1px;}

/* ── MAIN ── */
.main{max-width:1140px;margin:0 auto;padding:26px 18px 64px;}
.filter-bar{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;align-items:center;}
.sbox{
  flex:1;min-width:200px;display:flex;align-items:center;
  background:var(--card);border:2px solid var(--border);border-radius:12px;
  padding:0 14px;gap:9px;box-shadow:var(--sh);transition:border-color .2s;
}
.sbox:focus-within{border-color:var(--green);}
.sbox input{flex:1;border:none;outline:none;font-family:'DM Sans',sans-serif;font-size:15px;color:var(--ink);background:transparent;padding:12px 0;}
.rcount{font-size:13px;font-weight:600;color:var(--ink3);white-space:nowrap;}

.cats{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:20px;}
.cat{
  padding:7px 14px;border-radius:30px;border:2px solid var(--border);
  background:var(--card);color:var(--ink2);font-size:12px;font-weight:600;
  cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;white-space:nowrap;
}
.cat:hover{border-color:var(--green);color:var(--green);}
.cat.on{background:var(--green);color:#fff;border-color:var(--green);}

/* ── GRID ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(295px,1fr));gap:15px;}

/* vendor card */
.vcard{
  background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);
  padding:17px 17px 13px;display:flex;flex-direction:column;gap:10px;
  box-shadow:var(--sh);transition:transform .2s,box-shadow .2s;
  position:relative;overflow:hidden;
}
.vcard:hover{transform:translateY(-3px);box-shadow:0 8px 26px rgba(26,18,8,.12);}
.trusted-badge{position:absolute;top:10px;right:10px;background:#EBF5EE;color:var(--green);font-size:10px;font-weight:800;padding:4px 8px;border-radius:6px;border:1px solid #A8D5BC;z-index:5;}

.ctop{display:flex;align-items:flex-start;gap:12px;}
.cav{
  width:44px;height:44px;min-width:44px;border-radius:12px;background:var(--mint);
  display:flex;align-items:center;justify-content:center;
  font-family:'Fraunces',serif;font-size:19px;font-weight:900;color:var(--green);
}
.cname{font-size:15px;font-weight:700;color:var(--ink);margin-bottom:3px;line-height:1.3;}
.ccat{display:inline-block;background:var(--gold-l);color:var(--gold);border-radius:5px;font-size:11px;font-weight:700;padding:2px 8px;}
.cremark{font-size:12px;color:var(--ink3);margin-top:2px;line-height:1.4;}
.cphone{font-size:14px;font-weight:700;color:var(--green);letter-spacing:.3px;margin-top:5px;}

.cacts{display:flex;gap:7px;margin-top:5px;}
.bcall{
  flex:1;background:var(--green);color:#fff;border:none;border-radius:9px;
  padding:10px 8px;font-size:13px;font-weight:700;cursor:pointer;
  font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;gap:4px;
}
.bedit{
  background:transparent;color:var(--ink3);border:1.5px solid var(--border);
  font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;
  padding:9px 11px;border-radius:9px;transition:all .15s;white-space:nowrap;
}

/* ── MODAL ── */
.ov{
  display:none;position:fixed;inset:0;background:rgba(26,18,8,.55);
  z-index:200;align-items:center;justify-content:center;
  padding:18px;backdrop-filter:blur(3px);
}
.ov.open{display:flex;}
.modal{
  background:var(--card);border-radius:20px;width:100%;max-width:510px;
  max-height:90vh;overflow-y:auto;padding:22px;
  box-shadow:0 24px 60px rgba(0,0,0,.25);animation:su .25s ease;
}
@keyframes su{from{transform:translateY(26px);opacity:0}to{transform:translateY(0);opacity:1}}
.mbody{display:flex;flex-direction:column;gap:13px;}
.fg{display:flex;flex-direction:column;gap:5px;}
.fl{font-size:12px;font-weight:700;color:var(--ink2);letter-spacing:.3px;text-transform:uppercase;}
.fi,.ft{
  width:100%;padding:11px 13px;border:2px solid var(--border);border-radius:11px;
  font-size:15px;font-family:'DM Sans',sans-serif;color:var(--ink);background:#fff;outline:none;
}
.bsub{
  width:100%;padding:13px;background:var(--green);color:#fff;border:none;
  border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;
  font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;
}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:22px;left:50%;
  transform:translateX(-50%);
  padding:11px 22px;border-radius:40px;font-size:14px;font-weight:600;
  z-index:999;opacity:0;transition:0.3s;color:#fff;
}
#toast.show{opacity:1;}

footer{background:var(--ink);color:var(--ink3);text-align:center;padding:18px;font-size:13px;}
</style>
</head>
<body>

<nav>
  <div class="nav-logo">🏘️ Resident Directory</div>
  <div class="nav-right">
    <button class="sync-btn" onclick="window.open('https://drive.google.com/file/d/1W5Ze93vt-Zn8O1Rth_wlWv3fCf23mOd1/view?usp=sharing', '_blank')">📋 Rate List</button>
    <button class="sync-btn" id="syncBtn" onclick="loadVendors()">
      <span class="sync-icon">↻</span> Refresh
    </button>
    <button class="btn-add-nav" onclick="openAdd()">+ Add Vendor</button>
  </div>
</nav>

<section class="hero">
  <h1>Society Directory</h1>
  <p>Trusted neighborhood vendors with verified Versalia RWA rates.</p>
</section>

<div class="stats-bar">
  <div class="stat"><div class="stat-num" id="sV">—</div><div class="stat-lbl">Vendors</div></div>
  <div class="stat"><div class="stat-num" id="sC">—</div><div class="stat-lbl">Categories</div></div>
</div>

<div class="main">
  <div class="filter-bar">
    <div class="sbox">
      <span>🔍</span>
      <input type="text" id="searchIn" placeholder="Search name, service..." oninput="renderVendors()"/>
    </div>
    <div class="rcount" id="rc"></div>
  </div>
  <div class="cats" id="cats"></div>
  <div class="grid" id="grid"></div>
</div>

<div id="toast"></div>

<!-- ADD / EDIT MODAL -->
<div class="ov" id="formModal">
  <div class="modal">
    <h2 id="formTitle" style="margin-bottom:15px; font-family:'Fraunces',serif;">Add Vendor</h2>
    <div class="mbody">
      <div class="fg">
        <label class="fl">Name *</label>
        <input class="fi" id="fName" placeholder="e.g. Sahil Aircool"/>
      </div>
      <div class="fg">
        <label class="fl">Phone (10 digits) *</label>
        <input class="fi" id="fPhone" placeholder="10-digit number" maxlength="10"/>
      </div>
      <div class="fg">
        <label class="fl">Category *</label>
        <input class="fi" id="fService" placeholder="e.g. AC service, Plumber..." list="svcList"/>
        <datalist id="svcList"></datalist>
      </div>
      <div class="fg">
        <label class="fl">Description</label>
        <textarea class="ft" id="fRemark" rows="2" placeholder="Note speciality or timings..."></textarea>
      </div>
      <div class="fg">
        <label class="fl">Rating</label>
        <div id="starRating" style="font-size:24px; cursor:pointer; color:#E2D9CC;">
          <span onclick="setRating(1)">★</span><span onclick="setRating(2)">★</span><span onclick="setRating(3)">★</span><span onclick="setRating(4)">★</span><span onclick="setRating(5)">★</span>
        </div>
        <input type="hidden" id="fRating" value="0"/>
      </div>
      <button class="bsub" id="formSubmit" onclick="submitForm()">
        <span id="formBtnTxt">Save Vendor</span>
      </button>
      <button style="width:100%; margin-top:10px; background:none; border:none; color:var(--ink3); cursor:pointer;" onclick="closeModal('formModal')">Cancel</button>
    </div>
  </div>
</div>

<footer><strong>Resident Directory</strong> · Society Vendor Network · Free to use</footer>

<script>
const API = 'https://sheetdb.io/api/v1/5cje84i3oi667';

let vendors = [], activeCat = 'All', isEdit = false, currentRating = 0;

async function loadVendors() {
  const syncBtn = document.getElementById('syncBtn');
  if(syncBtn) syncBtn.classList.add('loading');
  
  try {
    const rows = await fetch(API).then(r => r.json());
    
    // FLEXIBLE MAPPING: This finds columns regardless of spaces or capital letters
    vendors = rows.map((r, index) => {
      const findKey = (str) => Object.keys(r).find(k => k.toLowerCase().includes(str.toLowerCase()));
      
      const nameKey = findKey('Name');
      const phoneKey = findKey('Phone');
      const catKey = findKey('Category');
      const descKey = findKey('Description');
      const rateKey = findKey('Rating');

      return {
        name: r[nameKey] || 'Unknown',
        // Pro Tip: Force clean 10-digit number display
        phone: String(r[phoneKey] || '').replace(/\D/g, '').slice(-10),
        svc: r[catKey] || 'General',
        rem: r[descKey] || '',
        rating: parseInt(r[rateKey]) || 0
      };
    }).filter(v => v.name !== 'Unknown');

    // Duplicate logic: Keep top 3 per category
    const grouped = {};
    vendors.sort((a,b) => b.rating - a.rating).forEach(v => {
      if(!grouped[v.svc]) grouped[v.svc] = [];
      if(grouped[v.svc].length < 3) grouped[v.svc].push(v);
    });
    vendors = Object.values(grouped).flat();

    buildCats();
    renderVendors();
  } catch(e) {
    showToast('Error connecting to sheet', '#C0392B');
  } finally {
    if(syncBtn) syncBtn.classList.remove('loading');
  }
}

function renderVendors() {
  const q = document.getElementById('searchIn').value.toLowerCase();
  const list = vendors.filter(v => 
    (activeCat === 'All' || v.svc === activeCat) && 
    (v.name.toLowerCase().includes(q) || v.svc.toLowerCase().includes(q))
  );
  
  document.getElementById('grid').innerHTML = list.map(v => `
    <div class="vcard">
      ${v.rating >= 4 ? '<div class="trusted-badge">⭐ Highly Recommended</div>' : ''}
      <div class="ctop">
        <div class="cav">${v.name[0].toUpperCase()}</div>
        <div style="flex:1;padding-right:28px">
          <div class="cname">${v.name}</div>
          <span class="ccat">${v.svc}</span>
          <div style="color:#C8922A; font-size:12px; margin-top:4px;">
            ${'★'.repeat(v.rating)}${'☆'.repeat(5-v.rating)}
          </div>
        </div>
      </div>
      <div class="cphone" style="display:block !important;">📱 +91 ${v.phone || 'No Number'}</div>
      <div class="cacts">
        <button class="bcall" onclick="window.location.href='tel:+91${v.phone}'">📞 Call</button>
        <button class="bedit" onclick="openEdit('${v.name.replace(/'/g, "\\'")}')">✏ Edit</button>
      </div>
    </div>`).join('');

  document.getElementById('rc').textContent = `${list.length} vendors visible`;
}

function openEdit(name) {
  const v = vendors.find(x => x.name === name);
  if (!v) return;
  isEdit = true;
  document.getElementById('formTitle').textContent = 'Edit Vendor';
  document.getElementById('formBtnTxt').textContent = 'Update Vendor';
  
  // FIXED: Populating the fields properly
  document.getElementById('fName').value = v.name;
  document.getElementById('fPhone').value = v.phone;
  document.getElementById('fService').value = v.svc;
  document.getElementById('fRemark').value = v.rem;
  
  setRating(v.rating);
  openModal('formModal');
}

async function submitForm() {
  const name = document.getElementById('fName').value.trim();
  const phone = document.getElementById('fPhone').value.trim();
  const svc = document.getElementById('fService').value.trim();
  const rem = document.getElementById('fRemark').value.trim();

  if (!name || phone.length < 10 || !svc) {
    showToast('Fill all fields correctly', '#C0392B');
    return;
  }

  const payload = {
    [C_NAME]: name,
    [C_PHON]: phone,
    [C_SVC]: svc,
    [C_REM]: rem,
    [C_RATE]: currentRating
  };
  
  const url = isEdit ? `${API}/${C_NAME}/${encodeURIComponent(name)}` : API;
  const method = isEdit ? 'PATCH' : 'POST';

  try {
    await fetch(url, {
      method: method,
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({data: isEdit ? payload : [payload]})
    });
    closeModal('formModal');
    loadVendors();
    showToast(isEdit ? 'Updated!' : 'Added!', '#2A5C3F');
  } catch(e) { showToast('Save error', '#C0392B'); }
}

function populateSvcList() {
  document.getElementById('svcList').innerHTML = [...new Set(vendors.map(v=>v.svc))].sort().map(s=>`<option value="${s}">`).join('');
}
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function clearForm() { document.querySelectorAll('.fi, .ft').forEach(i => i.value = ''); setRating(0); }
function showToast(m, c) { const t = document.getElementById('toast'); t.textContent = m; t.style.background = c; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); }

loadVendors();
</script>
</body>
</html>
