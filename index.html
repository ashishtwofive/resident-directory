<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Resident Directory</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;0,9..144,900;1,9..144,400&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#F5F2EC;--card:#FFFDF8;--ink:#1A1208;--ink2:#5C5040;--ink3:#9C8E7A;
  --green:#2A5C3F;--mint:#A8D5BC;--gold:#C8922A;--gold-l:#FBF0D9;
  --red:#C0392B;--border:#E2D9CC;--sh:0 2px 16px rgba(26,18,8,.09);--r:16px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;}

/* ── NAV ── */
nav{
  background:var(--green);padding:0 20px;
  display:flex;align-items:center;justify-content:space-between;
  height:62px;position:sticky;top:0;z-index:100;
  box-shadow:0 2px 14px rgba(0,0,0,.2);
}
.nav-logo{font-family:'Fraunces',serif;font-size:19px;font-weight:900;color:#fff;}
.nav-right{display:flex;gap:8px;align-items:center;}
.sync-btn{background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.22);color:#fff;border-radius:9px;padding:7px 13px;font-size:12px;font-weight:600;cursor:pointer;}
.btn-add-nav{background:var(--gold);color:#fff;border:none;border-radius:9px;padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer;}

/* ── HERO ── */
.hero{background:var(--green);padding:60px 20px 80px;text-align:center;position:relative;overflow:hidden;}
.hero h1{font-family:'Fraunces',serif;font-size:clamp(40px,8vw,72px);font-weight:900;color:#fff;line-height:1;margin-bottom:20px;position:relative;}
.hero h1 em{font-style:italic;color:var(--mint);font-weight:400;}
.hero p{color:#C0D9CC;font-size:clamp(16px,2vw,19px);max-width:600px;margin:0 auto;line-height:1.5;position:relative;}

/* ── STATS ── */
.stats-bar{background:var(--card);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;justify-content:center;gap:48px;flex-wrap:wrap;}
.stat-num{font-family:'Fraunces',serif;font-size:28px;font-weight:900;color:var(--green);}
.stat-lbl{font-size:11px;color:var(--ink3);font-weight:700;text-transform:uppercase;}

/* ── MAIN ── */
.main{max-width:1140px;margin:0 auto;padding:30px 18px 80px;}
.filter-bar{display:flex;gap:12px;margin-bottom:24px;align-items:center;}
.sbox{flex:1;display:flex;align-items:center;background:var(--card);border:2px solid var(--border);border-radius:14px;padding:0 16px;gap:10px;}
.sbox input{flex:1;border:none;outline:none;font-size:16px;padding:14px 0;background:transparent;}

.cats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px;}
.cat{padding:8px 18px;border-radius:30px;border:2px solid var(--border);background:var(--card);font-size:13px;font-weight:600;cursor:pointer;}
.cat.on{background:var(--green);color:#fff;border-color:var(--green);}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;}
.vcard{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);padding:20px;position:relative;transition:0.25s;display:flex;flex-direction:column;gap:10px;}
.vcard:hover{transform:translateY(-4px);box-shadow:var(--sh);}

.trusted-badge{
  position:absolute;top:12px;right:12px;background:#EBF5EE;color:var(--green);
  font-size:10px;font-weight:800;padding:5px 10px;border-radius:7px;
  border:1px solid #A8D5BC;z-index:5;
}

.ctop{display:flex;gap:14px;}
.cav{width:48px;height:48px;border-radius:14px;background:var(--mint);display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-size:20px;font-weight:900;color:var(--green);}
.cname{font-size:16px;font-weight:700;line-height:1.2; padding-right: 45px;}
.ccat{display:inline-block;background:var(--gold-l);color:var(--gold);border-radius:6px;font-size:11px;font-weight:700;padding:3px 10px;margin-top:4px;}

.cremark {font-size: 12px; color: var(--ink3); margin-top: 4px; line-height: 1.4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%;}
.cphone{font-size:15px;font-weight:700;color:var(--green);margin-top:6px;}
.cacts{display:flex;gap:8px;margin-top:12px;}
.bcall{flex:1;background:var(--green);color:#fff;border:none;border-radius:10px;padding:12px;font-weight:700;cursor:pointer;}
.bedit{background:transparent;border:1.5px solid var(--border);border-radius:10px;padding:12px;font-weight:600;cursor:pointer;font-size:13px;}

.ov{display:none;position:fixed;inset:0;background:rgba(26,18,8,.6);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.ov.open{display:flex;}
.modal{background:var(--card);border-radius:24px;width:100%;max-width:520px;padding:28px;}
.fg{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
.fl{font-size:12px;font-weight:700;text-transform:uppercase;color:var(--ink2);}
.fi,.ft{width:100%;padding:12px 14px;border:2px solid var(--border);border-radius:12px;outline:none;font-size:15px;}
.bsub{width:100%;padding:14px;background:var(--green);color:#fff;border:none;border-radius:14px;font-weight:700;font-size:16px;cursor:pointer;}

#toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:50px;opacity:0;transition:0.3s;z-index:999;color:#fff;}
#toast.show{opacity:1;}
</style>
</head>
<body>

<nav>
  <div class="nav-logo">🏘️ Resident Directory</div>
  <div class="nav-right">
    <button class="sync-btn" onclick="window.open('https://drive.google.com/file/d/1caR1xi7Cdu-dj7mUd4SmEty04lH7mOVu/view?usp=sharing', '_blank')">🧾 Bills</button>
    <button class="sync-btn" onclick="window.open('https://drive.google.com/file/d/1W5Ze93vt-Zn8O1Rth_wlWv3fCf23mOd1/view?usp=sharing', '_blank')">📋 Rate List</button>
    <button class="sync-btn" id="syncBtn" onclick="loadVendors()">↻ Refresh</button>
    <button class="btn-add-nav" onclick="openAdd()">+ Add Vendor</button>
  </div>
</nav>

<section class="hero">
  <h1>All Society Vendors<br><em>One Place, Free</em></h1>
  <p>Trusted vendors recommended by your neighbours — plumbers, doctors, cooks & more.</p>
</section>

<div class="stats-bar">
  <div class="stat"><div class="stat-num" id="sV">—</div><div class="stat-lbl">Vendors</div></div>
  <div class="stat"><div class="stat-num" id="sC">—</div><div class="stat-lbl">Categories</div></div>
</div>

<div class="main">
  <div class="filter-bar">
    <div class="sbox">🔍 <input type="text" id="searchIn" placeholder="Search name or service..." oninput="renderVendors()"/></div>
  </div>
  <div class="cats" id="cats"></div>
  <div class="grid" id="grid"></div>
</div>

<div id="toast"></div>

<div class="ov" id="formModal">
  <div class="modal">
    <h2 id="formTitle" style="margin-bottom:20px; font-family:'Fraunces', serif;">Manage Vendor</h2>
    <div class="mbody">
      <div class="fg"><label class="fl">Name *</label><input class="fi" id="fName"/></div>
      <div class="fg"><label class="fl">Phone *</label><input class="fi" id="fPhone" maxlength="10"/></div>
      <div class="fg">
        <label class="fl">Category *</label>
        <input class="fi" id="fService" list="svcList" placeholder="Select or type new..."/>
        <datalist id="svcList"></datalist>
      </div>
      <div class="fg"><label class="fl">Description</label><textarea class="ft" id="fRemark"></textarea></div>
      <div class="fg">
        <label class="fl">Rating</label>
        <div id="starRating" style="font-size:28px; cursor:pointer; color:#E2D9CC;">
          <span onclick="setRating(1)">★</span><span onclick="setRating(2)">★</span><span onclick="setRating(3)">★</span><span onclick="setRating(4)">★</span><span onclick="setRating(5)">★</span>
        </div>
        <input type="hidden" id="fRating" value="0"/>
      </div>
      <button class="bsub" id="formSubmit" onclick="submitForm()">Save Changes</button>
      <button style="width:100%; margin-top:12px; background:none; border:none; color:var(--ink3); font-weight:600; cursor:pointer;" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycby-ZdPN7LWyTYTDJPhSbsZ3CPRKSJrZ6m5zf1xeyY_DhQeIQjusdakLps1e7LvDdR_B/exec';
let vendors = [], activeCat = 'All', currentRating = 0;

async function loadVendors() {
  const syncBtn = document.getElementById('syncBtn');
  syncBtn.textContent = 'Loading...';
  try {
    const res = await fetch(API_URL);
    const data = await res.json();
    
    // Sort High-to-Low initially
    const sortedData = data.sort((a,b) => (parseFloat(b.Rating) || 0) - (parseFloat(a.Rating) || 0));

    vendors = sortedData.map(v => ({
      name: v.Name || '',
      phone: String(v.Phone || '').replace(/\D/g, '').slice(-10),
      svc: v.Category || 'General',
      rem: v.Description || '',
      rating: parseFloat(v.Rating) || 0
    })).filter(v => v.name);

    buildCats();
    renderVendors();
    updateDatalist(); // Populate the dropdown suggestions
  } catch(e) { showToast('Load Error', '#C0392B'); }
  syncBtn.textContent = '↻ Refresh';
}

function renderVendors() {
  const q = document.getElementById('searchIn').value.toLowerCase();
  const list = vendors.filter(v => 
    (activeCat === 'All' || v.svc === activeCat) && 
    (v.name.toLowerCase().includes(q) || v.svc.toLowerCase().includes(q))
  );
  
  document.getElementById('grid').innerHTML = list.map(v => `
    <div class="vcard">
      ${v.rating >= 4.5 ? '<div class="trusted-badge">⭐ Highly Recommended</div>' : ''}
      <div class="ctop">
        <div class="cav">${v.name[0].toUpperCase()}</div>
        <div style="flex:1; min-width:0;">
          <div class="cname">${v.name}</div>
          <span class="ccat">${v.svc}</span>
          <div style="color:var(--gold); font-size:12px; margin-top:2px;">
            ${'★'.repeat(Math.round(v.rating))}${'☆'.repeat(5-Math.round(v.rating))} (${v.rating.toFixed(1)})
          </div>
          ${v.rem ? `<div class="cremark" title="${v.rem}">${v.rem}</div>` : ''}
        </div>
      </div>
      <div class="cphone">📱 +91 ${v.phone}</div>
      <div class="cacts">
        <button class="bcall" onclick="window.location.href='tel:+91${v.phone}'">📞 Call</button>
        <button class="bedit" onclick="openEdit('${v.phone}')">Edit</button>
      </div>
    </div>`).join('');
}

async function submitForm() {
  const btn = document.getElementById('formSubmit');
  btn.textContent = 'Saving...'; btn.disabled = true;

  const payload = {
    Name: document.getElementById('fName').value,
    Phone: document.getElementById('fPhone').value,
    Category: document.getElementById('fService').value,
    Description: document.getElementById('fRemark').value,
    Rating: currentRating
  };

  try {
    await fetch(API_URL, { method: "POST", body: JSON.stringify(payload) });
    showToast('Success!', '#2A5C3F');
    closeModal();
    loadVendors();
  } catch(e) { showToast('Error', '#C0392B'); }
  btn.textContent = 'Save Changes'; btn.disabled = false;
}

function buildCats() {
  const uniqueCats = [...new Set(vendors.map(v => v.svc))].sort();
  const cats = ['All', ...uniqueCats];
  document.getElementById('cats').innerHTML = cats.map(c => `<button class="cat ${c===activeCat?'on':''}" onclick="setCat('${c}')">${c}</button>`).join('');
  document.getElementById('sV').textContent = vendors.length;
  document.getElementById('sC').textContent = uniqueCats.length;
}

// Logic to populate the 'Already Added Categories' into the dropdown
function updateDatalist() {
  const uniqueCats = [...new Set(vendors.map(v => v.svc))].sort();
  document.getElementById('svcList').innerHTML = uniqueCats.map(c => `<option value="${c}">`).join('');
}

function setCat(c) { activeCat = c; buildCats(); renderVendors(); }
function setRating(n) { currentRating = n; const stars = document.querySelectorAll('#starRating span'); stars.forEach((s, i) => s.style.color = i < n ? '#C8922A' : '#E2D9CC'); }
function openAdd() { clearForm(); document.getElementById('formTitle').textContent = 'Add Vendor'; openModal(); }
function openEdit(phone) {
  const v = vendors.find(x => x.phone === phone);
  document.getElementById('fName').value = v.name;
  document.getElementById('fPhone').value = v.phone;
  document.getElementById('fService').value = v.svc;
  document.getElementById('fRemark').value = v.rem;
  setRating(Math.round(v.rating));
  document.getElementById('formTitle').textContent = 'Edit Vendor';
  openModal();
}
function openModal() { document.getElementById('formModal').classList.add('open'); }
function closeModal() { document.getElementById('formModal').classList.remove('open'); }
function clearForm() { document.querySelectorAll('.fi, .ft').forEach(i => i.value = ''); setRating(0); }
function showToast(m, c) { const t = document.getElementById('toast'); t.textContent = m; t.style.background = c; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); }

loadVendors();
</script>
</body>
</html>
